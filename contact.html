<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Контакти</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>
<a href="javascript:history.back()" class="back_btn">←</a>
<section class="form_page">

<div class="form_box">

<h1 class="form_title">Написати мені</h1>

<form id="contactForm">

<input type="text" name="name" placeholder="Ваше ім'я" required>

<input type="email" name="email" placeholder="Ваш email" required>

<input type="text" name="subject" placeholder="Тема повідомлення" required>

<textarea name="message" placeholder="Ваше повідомлення" required></textarea>

<button type="submit" class="send_btn">Надіслати</button>

</form>

<p id="resultMessage"></p>

</div>

</section>

<script src="app.js"></script>

</body>
</html>
